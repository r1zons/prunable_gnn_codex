base: base/default
dataset: flickr
model: graphsage
preset: fast_debug

run:
  experiment_name: flickr_graphsage_l2_h64
  output_dir: runs/flickr_graphsage_sweep/l2_h64

model:
  name: graphsage
  num_layers: 2
  hidden_channels: 64

pruning:
  methods: [random, global_magnitude]
  sparsity_levels: [0.5, 0.9]
  structured: true
  finetune_epochs: 5
